<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | New Unity Project</title>
  </head>
  <body style="text-align: center">
    <canvas id="unity-canvas" style="width: 100%; height: 600px; background: transparent"></canvas>
    <script src="Build/webGlBuild.loader.js"></script>
<script>
    const eventCustom = new Event("build");
    var messagesFromShopify = new Array(); 
    
    function sendToUnity(type, messageState) {
        let state = (messageState === "false" || messageState === false) ? "false" : "true";
        
        try {
            switch (type) {
                case "Map": window.unityInstance.SendMessage('4 Glass long', 'MapFromJs', state); break;
                case "InnerScreen": window.unityInstance.SendMessage('4 Glass long', 'InnerScreenFromJs', state); break;
                case "OuterScreen": window.unityInstance.SendMessage('4 Glass long', 'OuterScreenFromJs', state); break;
                case "InnerSideScreen": window.unityInstance.SendMessage('4 Glass long', 'InnerSideScreenFromJs', state); break;
                case "OuterSideScreen": window.unityInstance.SendMessage('4 Glass long', 'OuterSideScreenFromJs', state); break;
                case "BusSchedule": window.unityInstance.SendMessage('4 Glass long', 'BusScheduleFromJs', state); break;
                case "Silluete": window.unityInstance.SendMessage('4 Glass long', 'SillueteFromJs', state); break;
                default: break;
            }
        } catch (error) {
            console.error("Ошибка отправки в Unity:", error);
        }
    }

    createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/webGlBuild.data",
        frameworkUrl: "Build/webGlBuild.framework.js",
        codeUrl: "Build/webGlBuild.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "New Unity Project",
        productVersion: "0.1",
    }).then((unityInstance) => {
        window.unityInstance = unityInstance;
        
        for (let i = 0; i < messagesFromShopify.length; i++) {
            sendToUnity(messagesFromShopify[i].type, messagesFromShopify[i].message);
        }
        messagesFromShopify = [];

        // 🚀 NEW: Tell the parent window (Shopify) that Unity is fully loaded!
        window.parent.postMessage({ type: "UNITY_READY" }, "*");

    }).catch((err) => {
        console.error("Unity failed to load:", err);
    });

    window.addEventListener("message", function(event) {
        if (!event.data || !event.data.type) return;

        if (window.unityInstance === undefined) {
            messagesFromShopify.push({ type: event.data.type, message: event.data.message });
        } else {
            sendToUnity(event.data.type, event.data.message);
        }
    });
</script>
  </body>
</html>
